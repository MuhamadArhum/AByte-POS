# ─── AByte Admin Panel — Nginx Config ────────────────────────────────────────
# Copy to: /etc/nginx/sites-available/abyte-admin
# Then: ln -s /etc/nginx/sites-available/abyte-admin /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 8080;
    server_name 185.255.94.23;

    root /var/www/AByte-POS/admin-panel/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
