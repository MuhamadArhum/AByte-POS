<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="#059669"/>

  <!-- POS screen / monitor top -->
  <rect x="14" y="10" width="36" height="24" rx="4" fill="white" opacity="0.95"/>
  <!-- Screen inner (green tint) -->
  <rect x="17" y="13" width="30" height="18" rx="2" fill="#d1fae5"/>
  <!-- Chart bars on screen -->
  <rect x="20" y="24" width="4" height="7" rx="1" fill="#059669"/>
  <rect x="26" y="20" width="4" height="11" rx="1" fill="#10b981"/>
  <rect x="32" y="22" width="4" height="9" rx="1" fill="#059669"/>
  <rect x="38" y="17" width="4" height="14" rx="1" fill="#10b981"/>

  <!-- Monitor stand -->
  <rect x="29" y="34" width="6" height="4" rx="1" fill="white" opacity="0.8"/>
  <!-- Base -->
  <rect x="23" y="38" width="18" height="3" rx="1.5" fill="white" opacity="0.7"/>

  <!-- Keypad / numpad below -->
  <rect x="18" y="43" width="28" height="12" rx="3" fill="white" opacity="0.2"/>
  <!-- Keypad dots -->
  <circle cx="24" cy="47" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="30" cy="47" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="36" cy="47" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="24" cy="52" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="30" cy="52" r="1.5" fill="white" opacity="0.8"/>
  <rect x="34" y="50" width="5" height="3" rx="1.5" fill="#34d399" opacity="0.9"/>
</svg>
