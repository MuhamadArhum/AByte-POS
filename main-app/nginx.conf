# ─── AByte Main App — Nginx Config ───────────────────────────────────────────
# Copy to: /etc/nginx/sites-available/abyte-main
# Then: ln -s /etc/nginx/sites-available/abyte-main /etc/nginx/sites-enabled/
# Then: nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name app.yourdomain.com;

    # Redirect HTTP → HTTPS (enable after SSL setup)
    # return 301 https://$host$request_uri;

    root /var/www/abyte-pos/main-app/frontend/dist;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|svg|ico|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API requests → backend on port 5000
    location /api/ {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # React SPA — all other routes to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

